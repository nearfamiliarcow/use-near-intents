name: Update Stats from Dune

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch stats from Dune
        run: ./scripts/update-stats.sh
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/lib/data/stats.ts || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/data/stats.ts
          git commit -m "chore: update topline stats from Dune"
          git push
